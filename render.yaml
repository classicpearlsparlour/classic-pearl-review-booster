services:
  - type: web
    name: qr-ai-review-booster-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_MODE
        value: mongodb
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
